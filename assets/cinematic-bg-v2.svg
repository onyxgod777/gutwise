<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <!-- Deep forest sky -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050f08" />
      <stop offset="25%" stop-color="#0a1f12" />
      <stop offset="50%" stop-color="#0d3b2e" />
      <stop offset="75%" stop-color="#1a5a3a" />
      <stop offset="100%" stop-color="#2d6a4f" />
    </linearGradient>
    
    <!-- Sun glow -->
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.6" />
      <stop offset="20%" stop-color="#fbbf24" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </radialGradient>
    
    <!-- Light ray gradients -->
    <linearGradient id="ray1" x1="50%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.12" />
      <stop offset="40%" stop-color="#fbbf24" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="ray2" x1="50%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0" />
    </linearGradient>
    
    <!-- Mist -->
    <radialGradient id="mistGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.07" />
      <stop offset="50%" stop-color="#34d399" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </radialGradient>
    
    <!-- Foliage gradients -->
    <radialGradient id="folDeep" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#0d3b2e" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#0a1a0f" stop-opacity="0.95" />
    </radialGradient>
    <radialGradient id="folMid" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a5a3a" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0d3b2e" stop-opacity="0.9" />
    </radialGradient>
    <radialGradient id="folTop" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#2d6a4f" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#1a5a3a" stop-opacity="0.7" />
    </radialGradient>
    
    <!-- Tree trunk -->
    <linearGradient id="trunkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a1a0f" stop-opacity="0.9" />
      <stop offset="30%" stop-color="#162e1a" stop-opacity="0.7" />
      <stop offset="60%" stop-color="#162e1a" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0a1a0f" stop-opacity="0.9" />
    </linearGradient>
    
    <!-- Ground -->
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d3b2e" stop-opacity="0" />
      <stop offset="30%" stop-color="#0a1a0f" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#050f08" stop-opacity="0.8" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>

  <!-- SKY -->
  <rect width="1600" height="1000" fill="url(#skyGrad)" />

  <!-- SUN (upper center-right) -->
  <circle cx="1200" cy="80" r="300" fill="url(#sunCore)" filter="url(#softGlow)" />
  
  <!-- LIGHT RAYS -->
  <polygon points="1200,80 0,1000 500,1000" fill="url(#ray1)" />
  <polygon points="1200,80 600,1000 1000,1000" fill="url(#ray1)" />
  <polygon points="1200,80 1100,1000 1400,1000" fill="url(#ray2)" />
  <polygon points="1200,80 250,1000 650,1000" fill="url(#ray2)" opacity="0.7" />
  <polygon points="1200,80 1400,1000 1600,900" fill="url(#ray1)" opacity="0.5" />

  <!-- === DEEP BACKGROUND FOLIAGE (layer 1) === -->
  <ellipse cx="100" cy="340" rx="160" ry="140" fill="url(#folDeep)" />
  <ellipse cx="280" cy="320" rx="140" ry="130" fill="url(#folDeep)" />
  <ellipse cx="460" cy="350" rx="150" ry="150" fill="url(#folDeep)" />
  <ellipse cx="650" cy="330" rx="170" ry="140" fill="url(#folDeep)" />
  <ellipse cx="850" cy="310" rx="150" ry="150" fill="url(#folDeep)" />
  <ellipse cx="1050" cy="340" rx="160" ry="140" fill="url(#folDeep)" />
  <ellipse cx="1250" cy="320" rx="140" ry="130" fill="url(#folDeep)" />
  <ellipse cx="1420" cy="350" rx="160" ry="150" fill="url(#folDeep)" />

  <!-- === MID FOLIAGE (layer 2) === -->
  <ellipse cx="80" cy="300" rx="110" ry="110" fill="url(#folMid)" />
  <ellipse cx="220" cy="280" rx="100" ry="100" fill="url(#folMid)" />
  <ellipse cx="370" cy="300" rx="120" ry="110" fill="url(#folMid)" />
  <ellipse cx="520" cy="290" rx="100" ry="100" fill="url(#folMid)" />
  <ellipse cx="680" cy="280" rx="130" ry="120" fill="url(#folMid)" />
  <ellipse cx="840" cy="270" rx="110" ry="110" fill="url(#folMid)" />
  <ellipse cx="1000" cy="290" rx="120" ry="110" fill="url(#folMid)" />
  <ellipse cx="1150" cy="280" rx="100" ry="100" fill="url(#folMid)" />
  <ellipse cx="1300" cy="300" rx="120" ry="110" fill="url(#folMid)" />
  <ellipse cx="1450" cy="290" rx="110" ry="100" fill="url(#folMid)" />

  <!-- === TREE TRUNKS === -->
  <g opacity="0.85">
    <rect x="80" y="240" width="16" height="760" fill="url(#trunkGrad)" rx="4" />
    <rect x="240" y="220" width="13" height="780" fill="url(#trunkGrad)" rx="3" />
    <rect x="400" y="230" width="18" height="770" fill="url(#trunkGrad)" rx="5" />
    <rect x="560" y="210" width="14" height="790" fill="url(#trunkGrad)" rx="3" />
    <rect x="720" y="200" width="17" height="800" fill="url(#trunkGrad)" rx="4" />
    <rect x="880" y="190" width="15" height="810" fill="url(#trunkGrad)" rx="4" />
    <rect x="1040" y="220" width="16" height="780" fill="url(#trunkGrad)" rx="4" />
    <rect x="1180" y="210" width="13" height="790" fill="url(#trunkGrad)" rx="3" />
    <rect x="1320" y="230" width="18" height="770" fill="url(#trunkGrad)" rx="5" />
    <rect x="1480" y="240" width="14" height="760" fill="url(#trunkGrad)" rx="3" />
  </g>

  <!-- === TOP FOLIAGE (layer 3 — sunlit) === -->
  <ellipse cx="80" cy="240" rx="80" ry="70" fill="url(#folTop)" />
  <ellipse cx="240" cy="220" rx="70" ry="60" fill="url(#folTop)" />
  <ellipse cx="400" cy="230" rx="85" ry="75" fill="url(#folTop)" />
  <ellipse cx="560" cy="210" rx="75" ry="65" fill="url(#folTop)" />
  <ellipse cx="720" cy="200" rx="90" ry="80" fill="url(#folTop)" />
  <ellipse cx="880" cy="190" rx="80" ry="70" fill="url(#folTop)" />
  <ellipse cx="1040" cy="220" rx="85" ry="75" fill="url(#folTop)" />
  <ellipse cx="1180" cy="210" rx="70" ry="65" fill="url(#folTop)" />
  <ellipse cx="1320" cy="230" rx="90" ry="80" fill="url(#folTop)" />
  <ellipse cx="1480" cy="240" rx="75" ry="65" fill="url(#folTop)" />

  <!-- === FOREGROUND BRANCHES SILHOUETTE === -->
  <path d="M0 340 Q40 320 60 350 Q80 310 100 340 L120 280 L140 330 Q180 300 200 340 Q220 290 240 330 L260 270 L280 320 Q320 280 340 330 L360 260 L380 320 Q420 270 440 330 L460 250 L480 320 Q520 260 540 330 L560 240 L580 320 Q620 250 640 330 L660 230 L680 320" stroke="#050f08" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5" />

  <!-- === GLOWING FIREFLY / BIOLUMINESCENT PARTICLES === -->
  <g filter="url(#glow)">
    <circle cx="320" cy="350" r="2" fill="#fbbf24" opacity="0.6" />
    <circle cx="560" cy="280" r="2.5" fill="#fbbf24" opacity="0.5" />
    <circle cx="780" cy="320" r="1.8" fill="#fcd34d" opacity="0.6" />
    <circle cx="920" cy="260" r="2" fill="#fbbf24" opacity="0.5" />
    <circle cx="1120" cy="300" r="2.2" fill="#fcd34d" opacity="0.6" />
    <circle cx="480" cy="400" r="1.5" fill="#fbbf24" opacity="0.4" />
    <circle cx="680" cy="380" r="1.8" fill="#fbbf24" opacity="0.4" />
    <circle cx="1020" cy="350" r="2" fill="#fcd34d" opacity="0.5" />
    <circle cx="1280" cy="400" r="1.5" fill="#fbbf24" opacity="0.4" />
    <circle cx="380" cy="450" r="1.2" fill="#fbbf24" opacity="0.3" />
    <circle cx="860" cy="420" r="1.5" fill="#fcd34d" opacity="0.35" />
    <circle cx="1350" cy="340" r="2" fill="#fbbf24" opacity="0.4" />
    <!-- Tiny distant sparkles -->
    <circle cx="200" cy="260" r="1" fill="#fbbf24" opacity="0.3" />
    <circle cx="450" cy="240" r="1.2" fill="#fcd34d" opacity="0.25" />
    <circle cx="700" cy="220" r="1" fill="#fbbf24" opacity="0.3" />
    <circle cx="1000" cy="250" r="1.2" fill="#fcd34d" opacity="0.25" />
    <circle cx="1400" cy="260" r="1" fill="#fbbf24" opacity="0.3" />
  </g>

  <!-- === ATMOSPHERIC MIST LAYERS === -->
  <ellipse cx="300" cy="650" rx="500" ry="120" fill="url(#mistGrad)" />
  <ellipse cx="900" cy="680" rx="600" ry="130" fill="url(#mistGrad)" />
  <ellipse cx="1300" cy="620" rx="450" ry="100" fill="url(#mistGrad)" opacity="0.7" />
  <ellipse cx="600" cy="750" rx="400" ry="100" fill="url(#mistGrad)" opacity="0.5" />

  <!-- === GROUND SHADOW / FOG === -->
  <rect x="0" y="720" width="1600" height="280" fill="url(#groundGrad)" />

  <!-- === FOREGROUND GRASS / UNDERGROWTH SILHOUETTE === -->
  <path d="M0 780 Q30 760 50 775 Q80 750 110 770 Q140 740 170 765 Q200 730 230 755 Q260 720 290 750 Q320 710 350 740 Q380 700 410 735 Q440 690 470 725 Q500 680 530 720 Q560 675 590 710 Q620 670 650 705 Q680 660 710 700 Q740 650 770 690 Q800 645 830 685 Q860 640 890 680 Q920 635 950 675 Q980 630 1010 670 Q1040 625 1070 665 Q1100 620 1130 660 Q1160 615 1190 655 Q1220 610 1250 650 Q1280 605 1310 645 Q1340 600 1370 640 Q1400 595 1430 635 Q1460 590 1490 630 Q1520 585 1550 625 Q1580 580 1600 620 L1600 1000 L0 1000Z" fill="#050f08" opacity="0.75" />

  <!-- Second grass layer for depth -->
  <path d="M0 820 Q40 800 80 815 Q120 790 160 810 Q200 785 240 805 Q280 775 320 800 Q360 770 400 795 Q440 765 480 790 Q520 755 560 780 Q600 750 640 775 Q680 745 720 770 Q760 740 800 765 Q840 735 880 760 Q920 730 960 755 Q1000 725 1040 750 Q1080 720 1120 745 Q1160 715 1200 740 Q1240 710 1280 735 Q1320 705 1360 730 Q1400 700 1440 725 Q1480 695 1520 720 Q1560 690 1600 715 L1600 1000 L0 1000Z" fill="#0a1a0f" opacity="0.5" />

  <!-- === LIGHT LEAK / LENS FLARE === -->
  <ellipse cx="1200" cy="600" rx="4" ry="350" fill="#fcd34d" opacity="0.03" transform="rotate(-12 1200 600)" />
  <ellipse cx="1180" cy="500" rx="2.5" ry="300" fill="#fbbf24" opacity="0.02" transform="rotate(-8 1180 500)" />
  <ellipse cx="1220" cy="700" rx="6" ry="200" fill="#fcd34d" opacity="0.015" transform="rotate(-18 1220 700)" />
</svg>
